<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosen Tinawi | Mobile Tech Expert</title>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --sub-text: #94a3b8; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: var(--card-bg); padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 400px; border-top: 4px solid var(--accent); }
        h1 { color: var(--accent); font-size: 24px; margin-bottom: 0.5rem; }
        h2 { font-size: 18px; color: var(--text); margin-bottom: 1rem; }
        p { color: var(--sub-text); line-height: 1.6; font-size: 14px; margin-bottom: 20px; }
        .badge { background-color: #0369a1; border-radius: 20px; padding: 5px 15px; font-size: 12px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>حسين تيناوي | Hosen Tinawi</h1>
        <h2>خبير تكنولوجيا الهواتف والبرمجيات</h2>
        <p>متخصص في صيانة الأنظمة الذكية، حلول الهواتف المتقدمة، واستشارات التقنية الرقمية بين بورصة ودمشق 🇸🇾 🇹🇷</p>
        <div class="badge">Verified Mobile Tech Specialist</div>
    </div>
</body>
</html>
